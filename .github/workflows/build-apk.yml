name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version

      - name: Install Android SDK platform 36
        run: |
          SDK_MGR=$(find "$ANDROID_HOME" -name "sdkmanager" | head -1)
          yes | "$SDK_MGR" --licenses > /dev/null || true
          "$SDK_MGR" "platforms;android-36" "build-tools;36.0.0"

      - name: Generate folder platform Android
        run: flutter create --platforms=android -a kotlin --org com.notatulis .

      - name: Tambahkan izin Bluetooth (BLE) ke AndroidManifest.xml
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if [ -f "$MANIFEST" ]; then
            sed -i 's#<application#<uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" android:maxSdkVersion="30" />\n\n    <application#' "$MANIFEST"
          fi

      - name: Pastikan minSdk 21 & compileSdk/targetSdk 36
        run: |
          GRADLE_KTS=android/app/build.gradle.kts
          GRADLE_GROOVY=android/app/build.gradle
          if [ -f "$GRADLE_KTS" ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' "$GRADLE_KTS" || true
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' "$GRADLE_KTS" || true
            sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 36/' "$GRADLE_KTS" || true
          elif [ -f "$GRADLE_GROOVY" ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' "$GRADLE_GROOVY" || true
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/' "$GRADLE_GROOVY" || true
            sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 36/' "$GRADLE_GROOVY" || true
          fi

      - name: flutter pub get
        run: flutter pub get

      - name: Patch file_picker (fix missing kotlin-android plugin bug)
        run: |
          FP_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -iname "file_picker-*" -type d | sort -V | tail -1)
          if [ -n "$FP_DIR" ]; then
            GRADLE_FILE="$FP_DIR/android/build.gradle"
            if [ -f "$GRADLE_FILE" ] && ! grep -q "kotlin-android\|org.jetbrains.kotlin.android" "$GRADLE_FILE"; then
              echo "Patching $GRADLE_FILE (missing kotlin-android plugin)"
              sed -i "s/apply plugin: 'com.android.library'/apply plugin: 'com.android.library'\napply plugin: 'org.jetbrains.kotlin.android'/" "$GRADLE_FILE"
            else
              echo "file_picker build.gradle already OK, skip patch"
            fi
          fi

      - name: Build APK debug
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nota-tulis-apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
