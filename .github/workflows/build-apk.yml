name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version

      - name: Install Android SDK platform 36
        run: |
          SDK_MGR=$(find "$ANDROID_HOME" -name "sdkmanager" | head -1)
          yes | "$SDK_MGR" --licenses > /dev/null || true
          "$SDK_MGR" "platforms;android-36" "build-tools;36.0.0"

      - name: Generate folder platform Android
        run: flutter create --platforms=android -a kotlin --org com.notatulis .

      - name: Tambahkan izin Bluetooth (BLE) ke AndroidManifest.xml & set nama app
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if [ -f "$MANIFEST" ]; then
            sed -i 's#<application#<uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" android:maxSdkVersion="30" />\n\n    <application#' "$MANIFEST"
            sed -i 's/android:label="[^"]*"/android:label="Nota Tulis"/' "$MANIFEST"
          fi

      - name: Pastikan minSdk 21 & compileSdk/targetSdk 36
        run: |
          GRADLE_KTS=android/app/build.gradle.kts
          GRADLE_GROOVY=android/app/build.gradle
          if [ -f "$GRADLE_KTS" ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' "$GRADLE_KTS" || true
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' "$GRADLE_KTS" || true
            sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 36/' "$GRADLE_KTS" || true
          elif [ -f "$GRADLE_GROOVY" ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' "$GRADLE_GROOVY" || true
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/' "$GRADLE_GROOVY" || true
            sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 36/' "$GRADLE_GROOVY" || true
          fi

      - name: flutter pub get
        run: flutter pub get

      - name: Generate ikon aplikasi (flutter_launcher_icons)
        run: dart run flutter_launcher_icons

      - name: Migrasi plugin lama ke Built-in Kotlin (file_picker, share_plus)
        run: |
          for PLUGIN in file_picker share_plus; do
            DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -iname "${PLUGIN}-*" -type d | sort -V | tail -1)
            if [ -n "$DIR" ]; then
              for GRADLE_FILE in "$DIR/android/build.gradle" "$DIR/android/build.gradle.kts"; do
                if [ -f "$GRADLE_FILE" ]; then
                  echo "Patching $GRADLE_FILE"
                  sed -i.bak \
                    -e "/apply plugin: ['\"]kotlin-android['\"]/d" \
                    -e "/apply plugin: ['\"]org\.jetbrains\.kotlin\.android['\"]/d" \
                    -e "/id ['\"]kotlin-android['\"]/d" \
                    -e "/id ['\"]org\.jetbrains\.kotlin\.android['\"]/d" \
                    -e '/id("org\.jetbrains\.kotlin\.android")/d' \
                    -e '/id("kotlin-android")/d' \
                    "$GRADLE_FILE"
                  diff "$GRADLE_FILE.bak" "$GRADLE_FILE" || true
                fi
              done
            fi
          done

      - name: Aktifkan minify & shrink resource untuk build release
        run: |
          GRADLE_KTS=android/app/build.gradle.kts
          GRADLE_GROOVY=android/app/build.gradle
          if [ -f "$GRADLE_KTS" ]; then
            sed -i '/signingConfig = signingConfigs.getByName("debug")/a\            isMinifyEnabled = true\n            isShrinkResources = true' "$GRADLE_KTS" || true
          elif [ -f "$GRADLE_GROOVY" ]; then
            sed -i '/signingConfig signingConfigs.debug/a\            minifyEnabled true\n            shrinkResources true' "$GRADLE_GROOVY" || true
          fi

      - name: Build APK release (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nota-tulis-apk-release
          path: build/app/outputs/flutter-apk/*.apk
