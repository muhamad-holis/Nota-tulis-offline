name: nota_tulis
description: Nota Tulis - aplikasi nota belanja offline untuk warung & UMKM (native Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Database lokal (pengganti Dexie/IndexedDB)
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Bluetooth thermal printer (BLE, setara Web Bluetooth GATT di versi lama)
  flutter_blue_plus: ^1.32.12

  # Util
  uuid: ^4.4.0
  intl: ^0.19.0
  image: ^4.2.0
  file_picker: ^11.0.2
  permission_handler: ^11.3.1
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
